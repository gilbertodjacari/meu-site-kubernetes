apiVersion: apps/v1
kind: Deployment
metadata:
  name: meu-site
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meu-site
  template:
    metadata:
      labels:
        app: meu-site
    spec:
      containers:
      - name: meu-site
        image: meu-site:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: meu-site
  namespace: default
spec:
  type: NodePort
  selector:
    app: meu-site
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30090